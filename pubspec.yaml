name: gen_design_studio
description: Mobile client for the Generative Design Studio (constraints -> AI design -> physics-tested STL).
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Networking
  http: ^1.2.1

  # 3D preview (renders glTF/GLB via the model-viewer web component)
  model_viewer_plus: ^1.7.0

  # Open/share the downloaded STL and launch external links
  url_launcher: ^6.2.6
  path_provider: ^2.1.3
  dio: ^5.4.3+1   # used for streaming file download with progress

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
